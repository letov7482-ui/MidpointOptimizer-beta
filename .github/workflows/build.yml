name: Build Midpoint Client

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # СТАРАЯ ВЕРСИЯ ДЛЯ СТАБИЛЬНОСТИ
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup JDK 17  # ИСПОЛЬЗУЕМ JAVA 17 (НЕ 21)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'
        
    - name: Clean build
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf .gradle/
        ./gradlew clean
        
    - name: Build
      run: ./gradlew build --no-daemon --stacktrace
      
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: Midpoint-Client
        path: build/libs/*.jar
