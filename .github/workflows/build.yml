name: Build Midpoint Client

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Build with Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: '8.5'
        arguments: build
        
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: Midpoint-Client
        path: build/libs/*.jar
